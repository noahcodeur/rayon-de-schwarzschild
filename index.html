<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buraco Negro Realista Mobile</title>
<style>
*{margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;touch-action:none;}
canvas{display:block;width:100vw;height:100vh;}
#controls{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(10,10,20,0.85);backdrop-filter:blur(4px);border:1px solid #ff6622;border-radius:12px;padding:10px 14px;color:#ff8833;z-index:100;user-select:none;max-height:40vh;overflow-y:auto;}
#controls h2{font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid #ff662255;padding-bottom:5px;color:#ffaa55;text-align:center;}
#controls label{display:block;font-size:10px;margin:6px 0 2px;color:#ffbb77;}
#controls input[type="range"]{width:100%;background:#221100;height:3px;border-radius:2px;-webkit-appearance:none;appearance:none;outline:none;}
#controls input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:#ff6622;cursor:pointer;box-shadow:0 0 15px #ff662288;}
#controls button{margin-top:6px;width:48%;padding:5px;background:#ff662222;border:1px solid #ff6622;color:#ff8833;font-family:inherit;font-weight:bold;text-transform:uppercase;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:0.3s;font-size:9px;display:inline-block;}
#controls button:hover{background:#ff662244;box-shadow:0 0 20px #ff662266;}
#controls .row{display:flex;gap:6px;justify-content:center;}
#info{position:absolute;top:10px;left:10px;color:#886644;font-size:9px;background:rgba(0,0,0,0.5);padding:3px 10px;border-radius:12px;border-left:2px solid #ff6622;z-index:100;pointer-events:none;}
#fps{position:absolute;top:10px;right:10px;color:#4f8;font-size:10px;font-family:monospace;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:8px;z-index:100;pointer-events:none;border:1px solid #4f8444;}
@media (max-width:600px){#controls{padding:8px 10px;}#controls h2{font-size:10px;}#controls label{font-size:9px;}}
</style>
</head>
<body>
<div id="info">🌀 Buraco Negro Realista</div>
<div id="fps">FPS: --</div>
<div id="controls">
<h2>Controles</h2>
<label>Massa: <span id="massValue">10</span></label>
<input type="range" id="mass" min="1" max="50" value="10" step="0.5" />
<label>Rotacao: <span id="speedValue">1.0</span></label>
<input type="range" id="speed" min="0" max="2.0" value="1" step="0.05" />
<label>Distorcao: <span id="distortionValue">1.0</span></label>
<input type="range" id="distortion" min="0" max="2.5" value="1" step="0.05" />
<div class="row">
<button id="resetBtn">Resetar</button>
<button id="toggleBloom">Bloom OFF</button>
</div>
</div>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.163.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader } from 'three/addons/shaders/FXAAShader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(4, 2.5, 7);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "default" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 2.0;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);
controls.rotateSpeed = 0.5;

const ambient = new THREE.AmbientLight(0x112244, 0.3);
scene.add(ambient);

const light = new THREE.DirectionalLight(0xff8844, 0.8);
light.position.set(3, 5, 4);
scene.add(light);

const backLight = new THREE.DirectionalLight(0x4466ff, 0.3);
backLight.position.set(-3, 0, -5);
scene.add(backLight);

// ===== FUNDO COM DISTORCAO =====
const starTexture = (() => {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000008';
    ctx.fillRect(0, 0, 1024, 512);
    for (let i = 0; i < 3000; i++) {
        const x = Math.random() * 1024;
        const y = Math.random() * 512;
        const size = 0.5 + Math.random() * 1.5;
        const bright = 0.3 + Math.random() * 0.7;
        ctx.fillStyle = `rgba(200, 220, 255, ${bright})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }
    return new THREE.CanvasTexture(canvas);
})();

const distortionUniforms = {
    uTexture: { value: starTexture },
    uDistortion: { value: 1.0 },
    uMass: { value: 10.0 },
    uTime: { value: 0.0 }
};

const distortionShader = {
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D uTexture;
        uniform float uDistortion;
        uniform float uMass;
        uniform float uTime;
        varying vec2 vUv;

        void main() {
            vec2 uv = vUv;
            vec2 center = vec2(0.5, 0.5);
            vec2 dir = uv - center;
            float dist = length(dir);
            float strength = uDistortion * uMass * 0.03;
            float distortion = 1.0 + strength / (dist + 0.05);
            vec2 distortedUv = center + dir * distortion;
            if (distortedUv.x < 0.0 || distortedUv.x > 1.0 || distortedUv.y < 0.0 || distortedUv.y > 1.0) {
                gl_FragColor = vec4(0.0, 0.0, 0.05, 1.0);
            } else {
                vec4 color = texture2D(uTexture, distortedUv);
                float vignette = 1.0 - smoothstep(0.3, 1.0, dist);
                color.rgb *= (0.7 + 0.3 * vignette);
                gl_FragColor = color;
            }
        }
    `
};

const starPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 30),
    new THREE.ShaderMaterial({
        uniforms: distortionUniforms,
        vertexShader: distortionShader.vertexShader,
        fragmentShader: distortionShader.fragmentShader,
        depthWrite: false,
        depthTest: false
    })
);
starPlane.position.set(0, 0, -20);
scene.add(starPlane);

// ===== BURACO NEGRO =====
const bhGroup = new THREE.Group();

const bhGeo = new THREE.SphereGeometry(1, 48, 48);
const bhMat = new THREE.MeshStandardMaterial({
    color: 0x000000,
    roughness: 0.1,
    metalness: 0.9,
    emissive: 0x110022,
    emissiveIntensity: 0.2
});
const blackHole = new THREE.Mesh(bhGeo, bhMat);
bhGroup.add(blackHole);

// Anel de fotons (photon ring)
const ringGeo = new THREE.TorusGeometry(1.15, 0.02, 24, 80);
const ringMat = new THREE.MeshBasicMaterial({
    color: 0xff8844,
    transparent: true,
    opacity: 0.7,
    blending: THREE.AdditiveBlending
});
const photonRing = new THREE.Mesh(ringGeo, ringMat);
photonRing.rotation.x = Math.PI / 2.3;
bhGroup.add(photonRing);

const ringGeo2 = new THREE.TorusGeometry(1.35, 0.015, 24, 80);
const ringMat2 = new THREE.MeshBasicMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.4,
    blending: THREE.AdditiveBlending
});
const photonRing2 = new THREE.Mesh(ringGeo2, ringMat2);
photonRing2.rotation.x = -Math.PI / 2.8;
photonRing2.rotation.z = 0.5;
bhGroup.add(photonRing2);

// Glow interno
const glowGeo = new THREE.RingGeometry(1.02, 1.6, 64);
const glowMat = new THREE.MeshBasicMaterial({
    color: 0xff6633,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.12,
    depthWrite: false,
    blending: THREE.AdditiveBlending
});
const glowRing = new THREE.Mesh(glowGeo, glowMat);
glowRing.rotation.x = Math.PI / 2.5;
bhGroup.add(glowRing);

scene.add(bhGroup);

// ===== DISCO DE ACRECAO COM TEXTURA =====
function generateDiscTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');
    const imageData = ctx.createImageData(512, 512);
    const data = imageData.data;
    for (let y = 0; y < 512; y++) {
        for (let x = 0; x < 512; x++) {
            const i = (y * 512 + x) * 4;
            const dx = x - 256;
            const dy = y - 256;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const angle = Math.atan2(dy, dx);
            if (dist < 30 || dist > 220) {
                data[i] = 0; data[i+1] = 0; data[i+2] = 0; data[i+3] = 0;
                continue;
            }
            const t = (dist - 30) / 190;
            const turbulence = 0.15 * Math.sin(angle * 8 + dist * 0.05) + 0.15 * Math.cos(angle * 5 - dist * 0.03);
            const r = 0.1 + 0.9 * (1 - t) + turbulence * 0.3;
            const g = 0.05 + 0.6 * (1 - t * t) + turbulence * 0.2;
            const b = 0.05 + 0.8 * t + turbulence * 0.1;
            const alpha = 0.6 + 0.4 * (1 - t);
            data[i] = Math.min(1, Math.max(0, r)) * 255;
            data[i+1] = Math.min(1, Math.max(0, g * 0.6)) * 255;
            data[i+2] = Math.min(1, Math.max(0, b * 0.8)) * 255;
            data[i+3] = Math.min(1, Math.max(0, alpha)) * 255;
        }
    }
    ctx.putImageData(imageData, 0, 0);
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(2, 1);
    return texture;
}

const discTexture = generateDiscTexture();

const discGeo = new THREE.RingGeometry(1.3, 5.5, 80);
const discMat = new THREE.MeshBasicMaterial({
    map: discTexture,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});
const disc = new THREE.Mesh(discGeo, discMat);
disc.rotation.x = Math.PI / 2.1;
scene.add(disc);

const discBack = disc.clone();
discBack.material = discMat.clone();
discBack.material.opacity = 0.4;
discBack.rotation.x = -Math.PI / 2.1;
discBack.position.y = -0.1;
scene.add(discBack);

// ===== POEIRA FINA (PARTICULAS LEVES) =====
let dustSystem = null;
function createDust(count) {
    if (dustSystem) {
        scene.remove(dustSystem);
        dustSystem.geometry.dispose();
        dustSystem.material.dispose();
    }
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
        const r = 1.5 + Math.random() * 4.5;
        const angle = Math.random() * Math.PI * 2;
        const height = (Math.random() - 0.5) * 0.3;
        pos[i*3] = r * Math.cos(angle);
        pos[i*3+1] = height;
        pos[i*3+2] = r * Math.sin(angle);
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
        color: 0xff8844,
        size: 0.03,
        transparent: true,
        opacity: 0.3,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        sizeAttenuation: true
    });
    dustSystem = new THREE.Points(geo, mat);
    dustSystem.userData = { angles: new Float32Array(count), radii: new Float32Array(count), heights: new Float32Array(count) };
    const arr = dustSystem.geometry.attributes.position.array;
    for (let i = 0; i < count; i++) {
        const r = 1.5 + Math.random() * 4.5;
        const angle = Math.random() * Math.PI * 2;
        const height = (Math.random() - 0.5) * 0.3;
        arr[i*3] = r * Math.cos(angle);
        arr[i*3+1] = height;
        arr[i*3+2] = r * Math.sin(angle);
        dustSystem.userData.angles[i] = angle;
        dustSystem.userData.radii[i] = r;
        dustSystem.userData.heights[i] = height;
    }
    scene.add(dustSystem);
    return dustSystem;
}
createDust(800);

// ===== POST-PROCESSING =====
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.3, 0.15, 0.05
);
bloomPass.threshold = 0.1;
bloomPass.strength = 0.0; // Desligado por padrao no mobile
composer.addPass(bloomPass);
let bloomEnabled = false;

const fxaaPass = new ShaderPass(FXAAShader);
fxaaPass.uniforms['resolution'].value.set(1 / window.innerWidth, 1 / window.innerHeight);
composer.addPass(fxaaPass);

// ===== CONTROLES UI =====
const massSlider = document.getElementById('mass');
const massSpan = document.getElementById('massValue');
const speedSlider = document.getElementById('speed');
const speedSpan = document.getElementById('speedValue');
const distortionSlider = document.getElementById('distortion');
const distortionSpan = document.getElementById('distortionValue');
const resetBtn = document.getElementById('resetBtn');
const toggleBloomBtn = document.getElementById('toggleBloom');

let mass = 10;
let rotationSpeed = 1.0;
let distortionStrength = 1.0;

massSlider.addEventListener('input', function() {
    mass = parseFloat(this.value);
    massSpan.textContent = mass;
    const scale = 0.5 + (mass / 50) * 2.5;
    bhGroup.scale.set(scale, scale, scale);
    glowRing.material.opacity = 0.06 + (mass / 50) * 0.2;
    photonRing.material.opacity = 0.3 + (mass / 50) * 0.5;
    distortionUniforms.uMass.value = mass;
});

speedSlider.addEventListener('input', function() {
    rotationSpeed = parseFloat(this.value);
    speedSpan.textContent = rotationSpeed.toFixed(2);
});

distortionSlider.addEventListener('input', function() {
    distortionStrength = parseFloat(this.value);
    distortionSpan.textContent = distortionStrength.toFixed(2);
    distortionUniforms.uDistortion.value = distortionStrength;
});

resetBtn.addEventListener('click', function() {
    if (!dustSystem) return;
    const posAttr = dustSystem.geometry.attributes.position;
    const arr = posAttr.array;
    const data = dustSystem.userData;
    const count = data.angles.length;
    for (let i = 0; i < count; i++) {
        const r = 1.5 + Math.random() * 4.5;
        const angle = Math.random() * Math.PI * 2;
        const height = (Math.random() - 0.5) * 0.3;
        arr[i*3] = r * Math.cos(angle);
        arr[i*3+1] = height;
        arr[i*3+2] = r * Math.sin(angle);
        data.angles[i] = angle;
        data.radii[i] = r;
        data.heights[i] = height;
    }
    posAttr.needsUpdate = true;
    disc.rotation.y = 0;
    dustSystem.rotation.y = 0;
});

toggleBloomBtn.addEventListener('click', function() {
    bloomEnabled = !bloomEnabled;
    if (bloomEnabled) {
        bloomPass.strength = 0.25;
        this.textContent = 'Bloom ON';
    } else {
        bloomPass.strength = 0.0;
        this.textContent = 'Bloom OFF';
    }
});

massSlider.dispatchEvent(new Event('input'));
speedSlider.dispatchEvent(new Event('input'));
distortionSlider.dispatchEvent(new Event('input'));

// ===== ANIMACAO =====
let frameCount = 0;
let lastFpsUpdate = performance.now();
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    distortionUniforms.uTime.value = time;

    // Rotacao do disco
    disc.rotation.y += 0.005 * rotationSpeed;
    discBack.rotation.y += 0.005 * rotationSpeed;

    // Poeira
    if (dustSystem) {
        dustSystem.rotation.y += 0.006 * rotationSpeed;
        const posAttr = dustSystem.geometry.attributes.position;
        const arr = posAttr.array;
        const data = dustSystem.userData;
        const count = data.angles.length;
        for (let i = 0; i < count; i++) {
            data.angles[i] += 0.01 * rotationSpeed * (0.8 + 1.5 / (data.radii[i] + 0.3));
            const r = data.radii[i];
            const a = data.angles[i];
            arr[i*3] = r * Math.cos(a);
            arr[i*3+1] = data.heights[i] + 0.02 * Math.sin(a * 3 + time);
            arr[i*3+2] = r * Math.sin(a);
        }
        posAttr.needsUpdate = true;
    }

    // Anel de fotons pulsante
    const pulse = 0.7 + 0.3 * Math.sin(time * 0.8);
    photonRing.material.opacity = (0.3 + mass/50 * 0.4) * pulse;
    photonRing.scale.set(1 + 0.02 * Math.sin(time * 0.5), 1 + 0.02 * Math.sin(time * 0.5), 1);
    photonRing.rotation.z += 0.003 * rotationSpeed;
    photonRing2.rotation.z -= 0.004 * rotationSpeed;
    photonRing2.material.opacity = (0.2 + mass/50 * 0.3) * (1 - pulse * 0.3);

    // Glow pulsante
    glowRing.material.opacity *= 0.998 + 0.002 * pulse;

    controls.update();
    composer.render();

    frameCount++;
    if (performance.now() - lastFpsUpdate > 1000) {
        document.getElementById('fps').textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsUpdate = performance.now();
    }
}
animate();

window.addEventListener('resize', function() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    composer.setSize(w, h);
    fxaaPass.uniforms['resolution'].value.set(1 / w, 1 / h);
});

console.log('Buraco Negro Realista Mobile rodando');
</script>
</body>
</html>
