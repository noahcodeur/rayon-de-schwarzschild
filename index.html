<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Buraco Negro Custo-Beneficio</title>
<style>
*{margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;}
canvas{display:block;}
#controls{position:absolute;top:20px;left:20px;background:rgba(10,10,20,0.85);backdrop-filter:blur(4px);border:1px solid #ff6622;border-radius:12px;padding:18px 22px;color:#ff8833;min-width:200px;box-shadow:0 0 40px rgba(255,102,34,0.2);z-index:100;user-select:none;}
#controls h2{font-size:13px;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;border-bottom:1px solid #ff662255;padding-bottom:8px;color:#ffaa55;}
#controls label{display:block;font-size:11px;margin:10px 0 3px;color:#ffbb77;}
#controls input[type="range"]{width:100%;background:#221100;height:4px;border-radius:2px;-webkit-appearance:none;appearance:none;outline:none;}
#controls input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#ff6622;cursor:pointer;box-shadow:0 0 20px #ff662288;}
#controls button{margin-top:14px;width:100%;padding:7px;background:#ff662222;border:1px solid #ff6622;color:#ff8833;font-family:inherit;font-weight:bold;text-transform:uppercase;letter-spacing:1px;border-radius:6px;cursor:pointer;transition:0.3s;font-size:11px;}
#controls button:hover{background:#ff662244;box-shadow:0 0 25px #ff662266;}
#info{position:absolute;bottom:20px;left:20px;color:#886644;font-size:11px;background:rgba(0,0,0,0.6);padding:5px 14px;border-radius:20px;border-left:2px solid #ff6622;z-index:100;pointer-events:none;backdrop-filter:blur(2px);}
#fps{position:absolute;top:20px;right:20px;color:#4f8;font-size:12px;font-family:monospace;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:8px;z-index:100;pointer-events:none;border:1px solid #4f8444;}
@media (max-width:600px){#controls{top:10px;left:10px;padding:12px 14px;min-width:140px;}#controls h2{font-size:11px;}#controls label{font-size:10px;}}
</style>
</head>
<body>
<div id="controls">
<h2>Buraco Negro 2.0</h2>
<label>Massa (M): <span id="massValue">10</span></label>
<input type="range" id="mass" min="1" max="60" value="10" step="0.5" />
<label>Particulas: <span id="countValue">1500</span></label>
<input type="range" id="particleCount" min="300" max="5000" value="1500" step="100" />
<label>Rotacao: <span id="speedValue">1.0</span></label>
<input type="range" id="speed" min="0" max="2.5" value="1" step="0.05" />
<button id="resetBtn">Resetar Orbitas</button>
<button id="toggleBloom" style="margin-top:6px;">Bloom: ON</button>
</div>
<div id="info">Simulacao hibrida Arraste para girar</div>
<div id="fps">FPS: --</div>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.163.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x030308);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,300);
camera.position.set(5,3,8);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:"default"});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.prepend(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.minDistance=2.5;
controls.maxDistance=25;
controls.target.set(0,0,0);
const ambient=new THREE.AmbientLight(0x222244,0.5);
scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xff8844,1.2);
dirLight.position.set(5,10,7);
scene.add(dirLight);
const backLight=new THREE.PointLight(0x4466ff,0.4);
backLight.position.set(-3,0,-5);
scene.add(backLight);
const starGeo=new THREE.BufferGeometry();
const starCount=4000;
const starPos=new Float32Array(starCount*3);
for(let i=0;i<starCount*3;i++){starPos[i]=(Math.random()-0.5)*400;}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0x88aaff,size:0.2,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,sizeAttenuation:true});
const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);
const bhGroup=new THREE.Group();
const bhGeo=new THREE.SphereGeometry(1,64,64);
const bhMat=new THREE.MeshStandardMaterial({color:0x000000,roughness:0.05,metalness:0.95,emissive:0x220033,emissiveIntensity:0.2});
const blackHole=new THREE.Mesh(bhGeo,bhMat);
bhGroup.add(blackHole);
const glowGeo=new THREE.RingGeometry(1.02,1.8,80);
const glowMat=new THREE.MeshBasicMaterial({color:0xff7733,side:THREE.DoubleSide,transparent:true,opacity:0.15,depthWrite:false,blending:THREE.AdditiveBlending});
const glowRing=new THREE.Mesh(glowGeo,glowMat);
glowRing.rotation.x=Math.PI/2.5;
bhGroup.add(glowRing);
const glowGeo2=new THREE.RingGeometry(1.05,1.5,80);
const glowMat2=new THREE.MeshBasicMaterial({color:0x4488ff,side:THREE.DoubleSide,transparent:true,opacity:0.08,depthWrite:false,blending:THREE.AdditiveBlending});
const glowRing2=new THREE.Mesh(glowGeo2,glowMat2);
glowRing2.rotation.x=-Math.PI/3.5;
glowRing2.rotation.z=0.8;
bhGroup.add(glowRing2);
const photonRingGeo=new THREE.TorusGeometry(1.25,0.025,32,80);
const photonRingMat=new THREE.MeshBasicMaterial({color:0xffaa44,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
const photonRing=new THREE.Mesh(photonRingGeo,photonRingMat);
photonRing.rotation.x=Math.PI/2.2;
bhGroup.add(photonRing);
const photonRing2=photonRing.clone();
photonRing2.material=photonRingMat.clone();
photonRing2.material.color.setHex(0x44aaff);
photonRing2.material.opacity=0.3;
photonRing2.scale.set(1.3,1.3,1.3);
photonRing2.rotation.x=-Math.PI/2.8;
bhGroup.add(photonRing2);
scene.add(bhGroup);
let particleSystem=null;
let particleCount=1500;
let rotationSpeed=1.0;
let bloomEnabled=true;
function createParticles(count){
if(particleSystem){scene.remove(particleSystem);particleSystem.geometry.dispose();particleSystem.material.dispose();}
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);
const colors=new Float32Array(count*3);
const sizes=new Float32Array(count);
const angles=new Float32Array(count);
const radii=new Float32Array(count);
const heights=new Float32Array(count);
const speeds=new Float32Array(count);
for(let i=0;i<count;i++){
const r=1.3+Math.pow(Math.random(),1.5)*5.0;
const angle=Math.random()*Math.PI*2;
const height=(Math.random()-0.5)*0.5*(1-1/(r+0.5));
pos[i*3]=r*Math.cos(angle);
pos[i*3+1]=height;
pos[i*3+2]=r*Math.sin(angle);
const t=(r-1.3)/5.0;
const rCol=0.1+0.9*(1-t);
const gCol=0.1+0.6*(1-t*t);
const bCol=0.2+0.8*t;
colors[i*3]=rCol;
colors[i*3+1]=gCol*0.5;
colors[i*3+2]=bCol*0.9;
sizes[i]=0.04+Math.random()*0.07;
angles[i]=angle;
radii[i]=r;
heights[i]=height;
speeds[i]=0.5+2.0/(r+0.3);
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
const mat=new THREE.PointsMaterial({size:0.06,vertexColors:true,transparent:true,opacity:0.92,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
particleSystem=new THREE.Points(geo,mat);
particleSystem.userData={positions:pos,angles,radii,heights,speeds};
scene.add(particleSystem);
return particleSystem;
}
createParticles(particleCount);
const composer=new EffectComposer(renderer);
const renderPass=new RenderPass(scene,camera);
composer.addPass(renderPass);
const bloomPass=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.4,0.2,0.1);
bloomPass.threshold=0.1;
bloomPass.strength=0.6;
bloomPass.radius=0.3;
composer.addPass(bloomPass);
const massSlider=document.getElementById('mass');
const massSpan=document.getElementById('massValue');
const countSlider=document.getElementById('particleCount');
const countSpan=document.getElementById('countValue');
const speedSlider=document.getElementById('speed');
const speedSpan=document.getElementById('speedValue');
const resetBtn=document.getElementById('resetBtn');
const toggleBloomBtn=document.getElementById('toggleBloom');
massSlider.addEventListener('input',function(){
const val=parseFloat(this.value);
massSpan.textContent=val;
const scale=0.5+(val/60)*2.8;
bhGroup.scale.set(scale,scale,scale);
glowRing.material.opacity=0.08+(val/60)*0.3;
glowRing2.material.opacity=0.04+(val/60)*0.2;
photonRing.material.opacity=0.3+(val/60)*0.5;
});
countSlider.addEventListener('input',function(){
const val=parseInt(this.value);
countSpan.textContent=val;
particleCount=val;
createParticles(val);
if(particleSystem)particleSystem.rotation.y=0;
});
speedSlider.addEventListener('input',function(){
const val=parseFloat(this.value);
speedSpan.textContent=val.toFixed(2);
rotationSpeed=val;
});
resetBtn.addEventListener('click',function(){
if(!particleSystem)return;
const posAttr=particleSystem.geometry.attributes.position;
const arr=posAttr.array;
const data=particleSystem.userData;
const count=data.angles.length;
for(let i=0;i<count;i++){
const r=1.3+Math.pow(Math.random(),1.5)*5.0;
const angle=Math.random()*Math.PI*2;
const height=(Math.random()-0.5)*0.5*(1-1/(r+0.5));
arr[i*3]=r*Math.cos(angle);
arr[i*3+1]=height;
arr[i*3+2]=r*Math.sin(angle);
data.angles[i]=angle;
data.radii[i]=r;
data.heights[i]=height;
data.speeds[i]=0.5+2.0/(r+0.3);
}
posAttr.needsUpdate=true;
if(particleSystem)particleSystem.rotation.y=0;
});
toggleBloomBtn.addEventListener('click',function(){
bloomEnabled=!bloomEnabled;
const idx=composer.passes.indexOf(bloomPass);
if(bloomEnabled&&idx===-1){composer.addPass(bloomPass);this.textContent='Bloom: ON';}
else if(!bloomEnabled&&idx!==-1){composer.removePass(bloomPass);this.textContent='Bloom: OFF';}
});
massSlider.dispatchEvent(new Event('input'));
countSlider.dispatchEvent(new Event('input'));
speedSlider.dispatchEvent(new Event('input'));
function updateCamera(){controls.update();}
let frameCount=0;
let lastFpsUpdate=performance.now();
function animate(){
requestAnimationFrame(animate);
if(particleSystem){
particleSystem.rotation.y+=0.006*rotationSpeed;
const posAttr=particleSystem.geometry.attributes.position;
const arr=posAttr.array;
const data=particleSystem.userData;
const count=data.angles.length;
const rotFactor=0.015*rotationSpeed;
for(let i=0;i<count;i++){
data.angles[i]+=rotFactor*data.speeds[i];
const r=data.radii[i];
const a=data.angles[i];
const wave=0.05*Math.sin(a*4+performance.now()*0.0008);
arr[i*3]=r*Math.cos(a);
arr[i*3+1]=data.heights[i]+wave*0.15;
arr[i*3+2]=r*Math.sin(a);
}
posAttr.needsUpdate=true;
}
stars.rotation.y+=0.00008;
const pulse=0.85+0.15*Math.sin(performance.now()*0.0015);
glowRing.material.opacity*=0.998+0.002*pulse;
photonRing.rotation.z+=0.002*rotationSpeed;
photonRing2.rotation.z-=0.003*rotationSpeed;
controls.update();
composer.render();
frameCount++;
if(performance.now()-lastFpsUpdate>1000){
document.getElementById('fps').textContent=`FPS: ${frameCount}`;
frameCount=0;
lastFpsUpdate=performance.now();
}
}
animate();
window.addEventListener('resize',function(){
const w=window.innerWidth;
const h=window.innerHeight;
camera.aspect=w/h;
camera.updateProjectionMatrix();
renderer.setSize(w,h);
composer.setSize(w,h);
});
console.log('Buraco Negro 2.0 rodando com bloom e particulas hibridas');
</script>
</body>
</html>
