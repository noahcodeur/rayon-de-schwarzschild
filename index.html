<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Saturno Realista</title>
<style>
*{margin:0;padding:0;}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace;}
canvas{display:block;}
#controls{position:absolute;bottom:10px;left:10px;right:10px;background:rgba(10,10,20,0.85);backdrop-filter:blur(4px);border:1px solid #44aaff;border-radius:12px;padding:10px 14px;color:#88ddff;z-index:100;max-height:35vh;overflow-y:auto;}
#controls h2{font-size:11px;text-transform:uppercase;text-align:center;color:#88ddff;border-bottom:1px solid #44aaff44;padding-bottom:5px;margin-bottom:8px;}
#controls label{display:block;font-size:10px;margin:6px 0 2px;color:#aae0ff;}
#controls input[type="range"]{width:100%;background:#112244;height:3px;border-radius:2px;-webkit-appearance:none;appearance:none;outline:none;}
#controls input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:#44aaff;cursor:pointer;box-shadow:0 0 15px #44aaff66;}
#controls button{margin-top:6px;width:100%;padding:5px;background:#44aaff22;border:1px solid #44aaff;color:#88ddff;font-family:inherit;font-weight:bold;text-transform:uppercase;border-radius:6px;cursor:pointer;font-size:10px;}
#controls button:hover{background:#44aaff44;}
#info{position:absolute;top:10px;left:10px;color:#6688aa;font-size:9px;background:rgba(0,0,0,0.5);padding:3px 12px;border-radius:12px;border-left:2px solid #44aaff;z-index:100;pointer-events:none;}
#fps{position:absolute;top:10px;right:10px;color:#4f8;font-size:10px;font-family:monospace;background:rgba(0,0,0,0.5);padding:2px 8px;border-radius:8px;z-index:100;pointer-events:none;border:1px solid #4f8444;}
</style>
</head>
<body>
<div id="info">🪐 Saturno Realista</div>
<div id="fps">FPS: --</div>
<div id="controls">
<h2>Controles</h2>
<label>Rotacao: <span id="speedValue">1.0</span></label>
<input type="range" id="speed" min="0" max="3.0" value="1.0" step="0.05" />
<label>Inclinacao Anéis: <span id="tiltValue">27</span></label>
<input type="range" id="tilt" min="0" max="60" value="27" step="0.5" />
<button id="resetBtn">Resetar Camera</button>
</div>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.163.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
}
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000008);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(3, 2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 2;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);

// ===== LUZES =====
const ambient = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.5);
sunLight.position.set(5, 3, 8);
scene.add(sunLight);

const backLight = new THREE.DirectionalLight(0x4488ff, 0.2);
backLight.position.set(-5, -2, -5);
scene.add(backLight);

// ===== ESTRELAS DE FUNDO =====
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
    starPos[i] = (Math.random() - 0.5) * 300;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.15, transparent: true, opacity: 0.7 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ===== TEXTURAS (GERADAS POR CANVAS - SEM DOWNLOAD) =====
function generateSaturnTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    // Fundo base (bege/amarelo)
    const grad = ctx.createLinearGradient(0, 0, 0, 256);
    grad.addColorStop(0, '#c8a86a');
    grad.addColorStop(0.3, '#d4b87a');
    grad.addColorStop(0.5, '#e8d09a');
    grad.addColorStop(0.7, '#d4b87a');
    grad.addColorStop(1, '#c8a86a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 512, 256);
    // Listras horizontais (bandas atmosféricas)
    for (let i = 0; i < 20; i++) {
        const y = Math.random() * 256;
        const height = 2 + Math.random() * 8;
        const bright = 0.6 + Math.random() * 0.4;
        ctx.fillStyle = `rgba(180, 160, 120, ${0.3 + 0.4 * (1 - bright)})`;
        ctx.fillRect(0, y, 512, height);
    }
    // Perturbações (turbulência)
    for (let i = 0; i < 50; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 256;
        const size = 5 + Math.random() * 20;
        const alpha = 0.1 + Math.random() * 0.2;
        ctx.fillStyle = `rgba(200, 180, 140, ${alpha})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }
    return new THREE.CanvasTexture(canvas);
}

function generateRingTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    // Fundo transparente
    ctx.clearRect(0, 0, 1024, 64);
    // Anéis com gaps
    for (let x = 0; x < 1024; x++) {
        const t = x / 1024;
        const dist = 0.3 + t * 0.7;
        // Densidade dos anéis (Cassini division)
        let density = 0.7 + 0.3 * Math.sin(t * 30) + 0.2 * Math.sin(t * 70 + 0.5);
        // Gap principal (Divisão de Cassini)
        if (t > 0.35 && t < 0.40) density *= 0.1;
        if (t > 0.65 && t < 0.70) density *= 0.3;
        // Anel F (externo)
        if (t > 0.85) density *= 0.5 + 0.5 * Math.sin(t * 80);
        const alpha = Math.min(1, density * 0.9);
        const bright = 0.6 + 0.4 * density;
        ctx.fillStyle = `rgba(220, 200, 170, ${alpha * 0.8})`;
        ctx.fillRect(x, 0, 1, 64);
    }
    return new THREE.CanvasTexture(canvas);
}

// ===== PLANETA SATURNO =====
const saturnGroup = new THREE.Group();

// Esfera do planeta
const planetGeo = new THREE.SphereGeometry(1, 64, 64);
const planetMat = new THREE.MeshStandardMaterial({
    map: generateSaturnTexture(),
    roughness: 0.7,
    metalness: 0.1,
    emissive: 0x221100,
    emissiveIntensity: 0.05
});
const planet = new THREE.Mesh(planetGeo, planetMat);
saturnGroup.add(planet);

// ===== ANÉIS =====
const ringTexture = generateRingTexture();
const ringGeo = new THREE.RingGeometry(1.4, 2.8, 120);
const ringMat = new THREE.MeshBasicMaterial({
    map: ringTexture,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.85,
    depthWrite: false
});
const rings = new THREE.Mesh(ringGeo, ringMat);
rings.rotation.x = Math.PI / 2.5; // Inclinação inicial
saturnGroup.add(rings);

// Anel interno mais fino
const ringGeoInner = new THREE.RingGeometry(1.2, 1.35, 80);
const ringMatInner = new THREE.MeshBasicMaterial({
    color: 0xccbbaa,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.3,
    depthWrite: false
});
const ringInner = new THREE.Mesh(ringGeoInner, ringMatInner);
ringInner.rotation.x = Math.PI / 2.5;
saturnGroup.add(ringInner);

scene.add(saturnGroup);

// ===== LUAS (OPCIONAL) =====
const moonGroup = new THREE.Group();
function createMoon(radius, color, orbitRadius, speed) {
    const geo = new THREE.SphereGeometry(radius, 16, 16);
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
    const moon = new THREE.Mesh(geo, mat);
    moon.userData = { orbitRadius, speed, angle: Math.random() * Math.PI * 2 };
    moonGroup.add(moon);
    return moon;
}
createMoon(0.08, 0xccbbaa, 1.6, 0.5);
createMoon(0.12, 0x887766, 2.0, 0.3);
createMoon(0.06, 0x99aacc, 2.4, 0.7);
scene.add(moonGroup);

// ===== CONTROLES UI =====
const speedSlider = document.getElementById('speed');
const speedSpan = document.getElementById('speedValue');
const tiltSlider = document.getElementById('tilt');
const tiltSpan = document.getElementById('tiltValue');
const resetBtn = document.getElementById('resetBtn');

let rotationSpeed = 1.0;
let ringTilt = 27;

speedSlider.addEventListener('input', function() {
    rotationSpeed = parseFloat(this.value);
    speedSpan.textContent = rotationSpeed.toFixed(2);
});

tiltSlider.addEventListener('input', function() {
    ringTilt = parseFloat(this.value);
    tiltSpan.textContent = ringTilt.toFixed(1);
    const tiltRad = ringTilt * Math.PI / 180;
    rings.rotation.x = Math.PI / 2.5 + tiltRad * 0.5;
    ringInner.rotation.x = Math.PI / 2.5 + tiltRad * 0.5;
});

resetBtn.addEventListener('click', function() {
    camera.position.set(3, 2, 6);
    controls.target.set(0, 0, 0);
    controls.update();
});

// ===== ANIMACAO =====
let frameCount = 0;
let lastFpsUpdate = performance.now();

function animate() {
    requestAnimationFrame(animate);
    
    // Rotacao do planeta
    saturnGroup.rotation.y += 0.008 * rotationSpeed;
    
    // Luas orbitando
    moonGroup.children.forEach((moon, i) => {
        const data = moon.userData;
        data.angle += 0.01 * data.speed * rotationSpeed;
        const x = data.orbitRadius * Math.cos(data.angle);
        const z = data.orbitRadius * Math.sin(data.angle);
        moon.position.set(x, 0, z);
    });
    
    // Estrelas girando lentamente
    stars.rotation.y += 0.0001;
    
    controls.update();
    renderer.render(scene, camera);
    
    frameCount++;
    if (performance.now() - lastFpsUpdate > 1000) {
        document.getElementById('fps').textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsUpdate = performance.now();
    }
}
animate();

window.addEventListener('resize', function() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

console.log('Saturno Realista rodando!');
</script>
</body>
</html>
